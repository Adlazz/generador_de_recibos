# ============================================================================
# EJEMPLO DE CONFIGURACIÓN DE SECRETS PARA STREAMLIT CLOUD
# ============================================================================
#
# INSTRUCCIONES:
# 1. Copia TODO el contenido de este archivo
# 2. Ve a tu app en Streamlit Cloud → Settings → Secrets
# 3. Pega este contenido
# 4. CAMBIA la contraseña hasheada y la cookie key (instrucciones abajo)
# 5. Guarda y haz deploy
#
# ============================================================================

[credentials]

# Usuario por defecto: admin
# Password temporal: admin123
# ⚠️ IMPORTANTE: Cambia esto por tu propia contraseña hasheada
[credentials.usernames.admin]
email = "admin@ejemplo.com"
name = "Administrador"
password = "$2b$12$tJGWQi74hajOuAS/uV7llOLeYkOteeVd6pRfYZ39rBVdldZ5lGT6G"

# Para agregar más usuarios, copia y pega este bloque:
#
# [credentials.usernames.NOMBRE_USUARIO]
# email = "email@ejemplo.com"
# name = "Nombre Completo"
# password = "$2b$12$HASH_GENERADO_AQUI"
#
# Para generar el hash de contraseña:
# Opción 1: Ejecuta en tu PC: python generate_password.py
# Opción 2: Usa https://bcrypt-generator.com/

[cookie]
name = "generador_recibos_auth"
# ⚠️ CAMBIA ESTA KEY por algo aleatorio y único para tu app
# Ejemplo: "mi_clave_super_secreta_xyz789abc"
key = "CAMBIA_ESTA_CLAVE_POR_ALGO_ALEATORIO_123456789"
expiry_days = 30
